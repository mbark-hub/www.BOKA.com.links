<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOKA | Delta</title>
    <style>
        /* إعدادات الخلفية المتحركة باللون الأحمر الغامق */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #4b0000 0%, #1a0000 100%);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* كرت التطبيق الرئيسي */
        .app-card {
            background: rgba(20, 0, 0, 0.8);
            border: 1px solid #ff000055;
            border-radius: 30px;
            padding: 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(15px);
        }

        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 25px #ff000088;
            border: 2px solid #ff0000;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .sub-text {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* زر التثبيت المباشر */
        .install-btn {
            background: linear-gradient(135deg, #8b0000 0%, #ff0000 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
            border: none;
            cursor: pointer;
        }

        .install-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #ff0000aa;
        }

        /* تصميم الإشعار (Pop-up) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .notification {
            background: #1a0000;
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 25px;
            width: 300px;
            text-align: center;
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .discord-link {
            display: block;
            background: #5865F2;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .close-btn {
            background: #333;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            float: left; /* زر الإغلاق تحت على اليسار */
        }

    </style>
</head>
<body>

    <div class="app-card">
        <h3 style="margin-top:0">تثبيت دلتا عالمية 📥</h3>
        <img src="https://i.ibb.co/Vp8nS8y/image.png" alt="Icon" class="app-icon">
        <div class="app-title">BOKA | Delta | BOKA</div>
        <div class="sub-text">ملف IPA جاهز</div>
        
        <a href="itms-services://?action=download-manifest&url=رابط_الملف_هنا" class="install-btn">
            <span>تثبيت مباشر</span>
            <span>📥</span>
        </a>
    </div>

    <div class="overlay" id="overlay">
        <div class="notification">
            <h3 style="margin-top:0">حقوقنا في السيرفر 👇</h3>
            <a href="https://discord.gg/9CCXkFJPr" target="_blank" class="discord-link">
                https://discord.gg/9CCXkFJPr
            </a>
            <button class="close-btn" onclick="closePopup()">إغلاق</button>
            <div style="clear: both;"></div>
        </div>
    </div>

    <script>
        // إظهار الإشعار بعد 3 ثواني
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'flex';
        }, 3000);

        function closePopup() {
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
